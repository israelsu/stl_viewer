<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STL Viewer</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #333;
        color: #333;
      }
      #app {
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      #controls {
        padding: 10px;
        background-color: #ff6600;
        color: white;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      #file-input {
        background-color: #333;
        color: white;
        padding: 5px;
        border: none;
        border-radius: 4px;
      }
      #viewer {
        flex: 1;
        position: relative;
      }
      #info {
        position: absolute;
        top: 10px;
        right: 50%;
        background-color: rgba(255, 102, 0, 0.8);
        color: white;
        padding: 10px;
        border-radius: 4px;
        font-size: 14px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="controls">
        <label for="file-input">Upload STL File:</label>
        <input type="file" id="file-input" accept=".stl" />
        <span id="file-name"></span>
      </div>
      <div id="viewer"></div>
      <div id="info">Units: mm</div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r162/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.162.0/examples/js/loaders/STLLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.162.0/examples/js/controls/OrbitControls.js"></script>
    <script src="/src/main.js"></script>
  </body>
</html>
